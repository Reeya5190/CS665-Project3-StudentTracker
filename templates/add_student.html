{% extends "base.html" %}

{% block content %}
<h2>Add Student</h2>

<form method="POST">
    <div class="mb-3">
        <label>Student Name</label>
        <input type="text" name="name" class="form-control">
    </div>

    <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control">
    </div>

    <button class="btn btn-primary">Add Student</button>
</form>
{% endblock %}
