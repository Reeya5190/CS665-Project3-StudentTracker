{% extends "base.html" %}

{% block content %}
<h2>Students</h2>

<a href="/add-student" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered table-striped">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Created At</th>
        <th>Metadata</th>
        <th>Action</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.student_id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.created_at }}</td>
        <td>{{ student.metadata }}</td>
        <td>
            <a href="/delete-student/{{ student.student_id }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
